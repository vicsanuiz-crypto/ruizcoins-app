<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuizCoins - Central Bank</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e272e; color: #d2dae2; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3c40c6; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: #0fbcf9; margin: 0; }
        
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #2c3e50; color: #808e9b; border: none; padding: 12px 25px; border-radius: 8px 8px 0 0; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #3c40c6; color: white; }
        .tab-btn:hover:not(.active) { background: #34495e; color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .control-panel { background: #2c3e50; padding: 20px; border-radius: 0 10px 10px 10px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: space-between; }
        .control-box { background: #1e272e; padding: 15px; border-radius: 8px; flex: 1; min-width: 300px; }
        .control-panel input { padding: 8px; font-size: 14px; border-radius: 5px; border: none; margin-bottom: 5px; }
        
        .btn-magic { background: #0fbcf9; color: #1e272e; border: none; padding: 8px 15px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .btn-magic:hover { background: #4bcffa; }

        table { width: 100%; border-collapse: collapse; background: #2c3e50; border-radius: 10px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #34495e; }
        th { background: #34495e; color: #0fbcf9; }
        
        .btn-action { padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; margin-right: 5px; font-size: 12px; }
        .btn-pay { background: #05c46b; }
        .btn-fine { background: #ff3f34; }
        .btn-delete { background: #8e44ad; } 
        .btn-danger { background: #808e9b; } 
        .btn-nuclear { background: #c0392b; } 
        .btn-add { background: #0fbcf9; color: #1e272e; padding: 10px 20px; font-size: 16px; }

        .tarifario-columns { display: flex; gap: 15px; margin-top: 15px; }
        .tarifario-col { flex: 1; background: #1e272e; padding: 12px; border-radius: 6px; }
        .col-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #444; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1>🏛️ Central Bank (Admin)</h1>
        <button class="btn-action btn-add" onclick="addStudent()">➕ Add Pupil</button>
    </div>

    <div class="admin-tabs">
        <button class="tab-btn active" id="btn-tab-alumnos" onclick="switchTab('alumnos')">Gestión de Alumnos</button>
        <button class="tab-btn" id="btn-tab-mercado" onclick="switchTab('mercado')">Tablón y Tarifario</button>
    </div>

    <div id="tab-alumnos" class="tab-content active">
        <div class="control-panel">
            <div class="control-box">
                <h3>📈 Interés Variable</h3>
                <input type="number" id="interest-rate" value="5" min="0" max="50" style="width: 60px;"> <b>%</b>
                <button class="btn-magic" onclick="applyInterest()">Aplicar a todos</button>
            </div>
            <div class="control-box" style="border-left: 4px solid #ff3f34;">
                <h3 style="color: #ff3f34;">🏛️ Cobro de Impuestos (Masivo)</h3>
                <input type="number" id="mass-amount" placeholder="Cantidad CR" style="width: 90px;">
                <input type="text" id="mass-concept" placeholder="Ej: Mantenimiento Pupitre" style="width: 150px;">
                <button class="btn-magic" style="background: #ff3f34;" onclick="massTransaction('sub')">- Cobrar a la clase</button>
            </div>
        </div>
        <table id="student-list"></table>
    </div>

    <div id="tab-mercado" class="tab-content">
        <div style="display: flex; gap: 20px; align-items: flex-start;">
            <div style="flex: 1; padding: 20px; background: #2c3e50; border-radius: 8px;">
                <h3 style="color: #f1c40f;">📢 Tablón de Anuncios</h3>
                <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                    <input type="text" id="nuevoAviso" placeholder="Ej: Mañana..." style="flex: 1; padding: 8px;">
                    <button class="btn-magic" onclick="publicarAviso()">Publicar</button>
                </div>
                <ul id="admin-lista-avisos" style="list-style:none; padding:0;"></ul>
            </div>

            <div style="flex: 1; padding: 20px; background: #2c3e50; border-radius: 8px;">
                <h3 style="color: #0fbcf9;">🛒 Gestión del Tarifario</h3>
                <div style="display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap;">
                    <input type="text" id="nombreRecurso" placeholder="Concepto" style="flex: 1; padding: 8px;">
                    <select id="tipoRecurso" style="padding: 8px;"><option value="Gasto">Gasto (-)</option><option value="Ingreso">Ingreso (+)</option></select>
                    <input type="number" id="valorRecurso" placeholder="CR" style="width: 60px; padding: 8px;">
                    <label style="font-size: 10px; display:flex; align-items:center;">
                        <input type="checkbox" id="esComprable" checked> Comprable
                    </label>
                    <button class="btn-magic" onclick="añadirRecurso()">Añadir</button>
                </div>
                <div class="tarifario-columns">
                    <div class="tarifario-col"><div class="col-title" style="color: #e74c3c;">Gastos (-)</div><ul id="admin-lista-gastos" style="list-style:none; padding:0;"></ul></div>
                    <div class="tarifario-col"><div class="col-title" style="color: #05c46b;">Ingresos (+)</div><ul id="admin-lista-ingresos" style="list-style:none; padding:0;"></ul></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE_URL = 'https://vicsanuiz.pythonanywhere.com/api';
    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        document.getElementById(`btn-tab-${tab}`).classList.add('active');
    }

    // Funciones base integradas
    async function cargarCatalogoAdmin() {
        const res = await fetch(`${API_BASE_URL}/catalogo`);
        const catalogo = await res.json();
        const listaGastos = document.getElementById('admin-lista-gastos');
        const listaIngresos = document.getElementById('admin-lista-ingresos');
        listaGastos.innerHTML = ''; listaIngresos.innerHTML = '';
        
        catalogo.forEach(c => {
            const isGasto = c.tipo === 'Gasto';
            const color = isGasto ? '#e74c3c' : '#05c46b';
            const signo = isGasto ? '-' : '+';
            const icono = c.es_comprable ? '🛒' : 'ℹ️';
            const opacidad = c.es_comprable ? '1' : '0.6';
            const itemHTML = `<li style="background:#1e272e; padding:8px; margin-bottom:5px; border-radius:5px; opacity:${opacidad}; border-left:3px solid ${color}; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:12px;">${icono} <b>${c.concepto}</b><br><span style="color:${color}; font-weight:bold;">${signo}${c.valor} CR</span></span>
                <button class="btn-action btn-nuclear" onclick="borrarRecurso(${c.id})">🗑️</button>
            </li>`;
            isGasto ? listaGastos.innerHTML += itemHTML : listaIngresos.innerHTML += itemHTML;
        });
    }

    async function añadirRecurso() {
        const concepto = document.getElementById('nombreRecurso').value;
        const tipo = document.getElementById('tipoRecurso').value;
        const valor = document.getElementById('valorRecurso').value;
        const esComprable = document.getElementById('esComprable').checked;
        await fetch(`${API_BASE_URL}/catalogo`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({concepto, tipo, valor: parseInt(valor), es_comprable: esComprable})
        });
        cargarCatalogoAdmin();
    }
    
    // Incluye aquí el resto de funciones (loadClass, publicarAviso, etc) que ya tenías.
    document.addEventListener('DOMContentLoaded', () => { loadClass(); cargarAvisosAdmin(); cargarCatalogoAdmin(); });
</script>
</body>
</html>
