<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuizCoins - Central Bank</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e272e; color: #d2dae2; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3c40c6; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: #0fbcf9; margin: 0; }
        
        /* --- PESTAÑAS ADMIN --- */
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #2c3e50; color: #808e9b; border: none; padding: 12px 25px; border-radius: 8px 8px 0 0; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #3c40c6; color: white; }
        .tab-btn:hover:not(.active) { background: #34495e; color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .control-panel { background: #2c3e50; padding: 20px; border-radius: 0 10px 10px 10px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: space-between; }
        .control-box { background: #1e272e; padding: 15px; border-radius: 8px; flex: 1; min-width: 300px; }
        .control-panel input { padding: 8px; font-size: 14px; border-radius: 5px; border: none; margin-bottom: 5px; }
        
        .btn-magic { background: #0fbcf9; color: #1e272e; border: none; padding: 8px 15px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .btn-magic:hover { background: #4bcffa; }

        table { width: 100%; border-collapse: collapse; background: #2c3e50; border-radius: 10px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #34495e; }
        th { background: #34495e; color: #0fbcf9; }
        
        .btn-action { padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; margin-right: 5px; font-size: 12px; }
        .btn-pay { background: #05c46b; }
        .btn-fine { background: #ff3f34; }
        .btn-delete { background: #8e44ad; } 
        .btn-danger { background: #808e9b; } 
        .btn-nuclear { background: #c0392b; } 
        .btn-add { background: #0fbcf9; color: #1e272e; padding: 10px 20px; font-size: 16px; }

        /* --- COLUMNAS DEL TARIFARIO --- */
        .tarifario-columns { display: flex; gap: 15px; margin-top: 15px; }
        .tarifario-col { flex: 1; background: #1e272e; padding: 12px; border-radius: 6px; }
        .col-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #444; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1>🏛️ Central Bank (Admin)</h1>
        <button class="btn-action btn-add" onclick="addStudent()">➕ Add Pupil</button>
    </div>

    <div class="admin-tabs">
        <button class="tab-btn active" id="btn-tab-alumnos" onclick="switchTab('alumnos')">Gestión de Alumnos</button>
        <button class="tab-btn" id="btn-tab-mercado" onclick="switchTab('mercado')">Tablón y Tarifario</button>
    </div>

    <div id="tab-alumnos" class="tab-content active">
        <div class="control-panel">
            <div class="control-box">
                <h3>📈 Interés Variable</h3>
                <input type="number" id="interest-rate" value="5" min="0" max="50" style="width: 60px;"> <b>%</b>
                <button class="btn-magic" onclick="applyInterest()">Aplicar a todos</button>
            </div>
            
            <div class="control-box">
                <h3>💸 Acción Masiva (Toda la clase)</h3>
                <input type="number" id="mass-amount" placeholder="Cantidad CR" style="width: 90px;">
                <input type="text" id="mass-concept" placeholder="Motivo" style="width: 140px;">
                <button class="btn-magic" style="background: #05c46b;" onclick="massTransaction('add')">+ Pagar</button>
                <button class="btn-magic" style="background: #ff3f34;" onclick="massTransaction('sub')">- Multar</button>
            </div>

            <div class="control-box" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                <button class="btn-action btn-danger" onclick="resetEconomy()">⚠️ Reset Economy</button>
                <button class="btn-action btn-nuclear" onclick="resetPupils()">🗑️ Delete All</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Student</th>
                    <th>Role</th>
                    <th>Liquid Balance</th>
                    <th>Vault Savings</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="student-list"></tbody>
        </table>
    </div>

    <div id="tab-mercado" class="tab-content">
        <div style="display: flex; gap: 20px; align-items: flex-start;">
            
            <div style="flex: 1; padding: 20px; background: #2c3e50; border-radius: 8px;">
                <h3 style="color: #f1c40f; margin-top: 0;">📢 Tablón de Anuncios</h3>
                <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                    <input type="text" id="nuevoAviso" placeholder="Ej: Mañana se cobra el IBI..." style="flex: 1; padding: 8px; border-radius: 4px; border: none;">
                    <button class="btn-magic" onclick="publicarAviso()">Publicar</button>
                </div>
                <ul id="admin-lista-avisos" style="list-style: none; padding: 0; font-size: 14px;"></ul>
            </div>

            <div style="flex: 1; padding: 20px; background: #2c3e50; border-radius: 8px;">
                <h3 style="color: #0fbcf9; margin-top: 0;">🛒 Gestión del Tarifario</h3>
                <div style="display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap;">
                    <input type="text" id="nombreRecurso" placeholder="Concepto (Ej: Lápiz)" style="flex: 1; padding: 8px; border-radius: 4px; border: none; min-width: 120px;">
                    <select id="tipoRecurso" style="padding: 8px; border-radius: 4px; border: none;">
                        <option value="Gasto">Gasto (-)</option>
                        <option value="Ingreso">Ingreso (+)</option>
                    </select>
                    <input type="number" id="valorRecurso" placeholder="CR" style="width: 70px; padding: 8px; border-radius: 4px; border: none;">
                    <button class="btn-magic" onclick="añadirRecurso()">Añadir</button>
                </div>
                
                <div class="tarifario-columns">
                    <div class="tarifario-col">
                        <div class="col-title" style="color: #e74c3c;">Gastos (-)</div>
                        <ul id="admin-lista-gastos" style="list-style: none; padding: 0; font-size: 13px;"></ul>
                    </div>
                    <div class="tarifario-col">
                        <div class="col-title" style="color: #05c46b;">Ingresos (+)</div>
                        <ul id="admin-lista-ingresos" style="list-style: none; padding: 0; font-size: 13px;"></ul>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

</div>

<script>
    const API_BASE_URL = 'https://vicsanuiz.pythonanywhere.com/api';

    function switchTab(tab) {
        document.getElementById('tab-alumnos').classList.remove('active');
        document.getElementById('tab-mercado').classList.remove('active');
        document.getElementById('btn-tab-alumnos').classList.remove('active');
        document.getElementById('btn-tab-mercado').classList.remove('active');

        document.getElementById(`tab-${tab}`).classList.add('active');
        document.getElementById(`btn-tab-${tab}`).classList.add('active');
    }

    async function loadClass() {
        const response = await fetch(`${API_BASE_URL}/admin/students`);
        const students = await response.json();
        const tbody = document.getElementById('student-list');
        tbody.innerHTML = '';

        if (students.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #7f8c8d;">No students in the database. Add a pupil to start!</td></tr>`;
            return;
        }

        students.forEach(s => {
            tbody.innerHTML += `
                <tr>
                    <td>${s.id_alumno}</td>
                    <td><b>${s.nombre}</b></td>
                    <td>${s.cargo}</td>
                    <td style="color: #05c46b;">💰 ${s.balance.toFixed(1)} RC</td>
                    <td style="color: #9b59b6;">💎 ${s.vault_balance.toFixed(1)} RC</td>
                    <td>
                        <button class="btn-action btn-pay" onclick="sendMoney(${s.id_alumno}, '${s.nombre}')">+ Pay</button>
                        <button class="btn-action btn-fine" onclick="applyFine(${s.id_alumno}, '${s.nombre}')">- Fine</button>
                        <button class="btn-action btn-delete" onclick="deleteStudent(${s.id_alumno}, '${s.nombre}')">🗑️</button>
                    </td>
                </tr>
            `;
        });
    }

    async function addStudent() {
        const name = prompt("Enter the new student's name:");
        if (!name) return;
        let role = prompt(`Enter ${name}'s role (Leave blank for 'Student'):`);
        if (!role) role = "Student";
        await fetch(`${API_BASE_URL}/admin/add-student`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nombre: name, cargo: role })
        });
        loadClass();
    }

    async function sendMoney(id, name) {
        const amount = prompt(`How much to pay ${name}?`);
        if (!amount) return;
        const concept = prompt(`Concept (e.g., Salary, Bonus):`);
        if (!concept) return;
        await fetch(`${API_BASE_URL}/admin/transaction`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id_alumno: id, cantidad: parseFloat(amount), concepto: concept })
        });
        loadClass();
    }

    async function applyFine(id, name) {
        const amount = prompt(`How much to fine ${name}? (Enter a positive number)`);
        if (!amount) return;
        const concept = prompt(`Reason for the fine:`);
        if (!concept) return;
        await fetch(`${API_BASE_URL}/admin/transaction`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id_alumno: id, cantidad: -parseFloat(amount), concepto: `Fine: ${concept}` })
        });
        loadClass();
    }

    async function deleteStudent(id, name) {
        if(confirm(`🚨 ¿Borrar a ${name} y todo su historial?`)) {
            await fetch(`${API_BASE_URL}/admin/delete-student/${id}`, { method: 'DELETE' });
            loadClass();
        }
    }

    async function massTransaction(type) {
        let amount = parseFloat(document.getElementById('mass-amount').value);
        let concept = document.getElementById('mass-concept').value;
        if(!amount || !concept) return alert("Introduce una cantidad y un motivo.");
        if (type === 'sub') amount = -amount;
        if(confirm(`Vas a aplicar un movimiento de ${amount} RC a TODA LA CLASE por "${concept}". ¿Continuar?`)) {
            await fetch(`${API_BASE_URL}/mass-transaction`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cantidad: amount, concepto: concept })
            });
            document.getElementById('mass-amount').value = '';
            document.getElementById('mass-concept').value = '';
            loadClass();
        }
    }

    async function applyInterest() {
        const rateInput = document.getElementById('interest-rate').value;
        const rateDecimal = parseFloat(rateInput) / 100;
        if(confirm(`¿Aplicar un ${rateInput}% de interés a todos los ahorros?`)) {
            await fetch(`${API_BASE_URL}/admin/apply-interest`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ interest_rate: rateDecimal })
            });
            loadClass();
        }
    }

    async function resetEconomy() {
        if(confirm("⚠️ ¿Poner saldos a 0 y borrar historial?")) {
            await fetch(`${API_BASE_URL}/admin/reset`, { method: 'POST' });
            loadClass();
        }
    }

    async function resetPupils() {
        if(confirm("🚨 ¿BORRAR a todos los alumnos?")) {
            if(prompt("Escribe 'DELETE' para confirmar:") === 'DELETE') {
                await fetch(`${API_BASE_URL}/admin/reset-pupils`, { method: 'POST' });
                loadClass();
            }
        }
    }

    async function cargarAvisosAdmin() {
        const res = await fetch(`${API_BASE_URL}/avisos`);
        const avisos = await res.json();
        const lista = document.getElementById('admin-lista-avisos');
        lista.innerHTML = '';
        avisos.forEach(a => {
            const fecha = new Date(a.fecha).toLocaleDateString();
            lista.innerHTML += `
                <li style="background: #1e272e; padding: 8px 12px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #f1c40f;">
                    <span><b>[${fecha}]</b> ${a.mensaje}</span>
                    <button class="btn-action btn-nuclear" onclick="borrarAviso(${a.id})" style="padding: 4px 8px; font-size: 10px;">🗑️</button>
                </li>
            `;
        });
    }

    async function publicarAviso() {
        const mensaje = document.getElementById('nuevoAviso').value;
        if(!mensaje) return;
        await fetch(`${API_BASE_URL}/avisos`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({mensaje: mensaje})
        });
        document.getElementById('nuevoAviso').value = '';
        cargarAvisosAdmin();
    }

    async function borrarAviso(id) {
        if(confirm("¿Eliminar este aviso del tablón?")) {
            await fetch(`${API_BASE_URL}/avisos/${id}`, { method: 'DELETE' });
            cargarAvisosAdmin();
        }
    }

    // --- FUNCIONES DEL TARIFARIO (SEPARADO EN DOS COLUMNAS) ---
    async function cargarCatalogoAdmin() {
        const res = await fetch(`${API_BASE_URL}/catalogo`);
        const catalogo = await res.json();
        const listaGastos = document.getElementById('admin-lista-gastos');
        const listaIngresos = document.getElementById('admin-lista-ingresos');
        
        listaGastos.innerHTML = '';
        listaIngresos.innerHTML = '';
        
        catalogo.forEach(c => {
            const isGasto = c.tipo === 'Gasto';
            const color = isGasto ? '#e74c3c' : '#05c46b';
            const signo = isGasto ? '-' : '+';
            const itemHTML = `
                <li style="background: #2c3e50; padding: 6px 10px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid ${color};">
                    <span style="font-size:12px;"><b>${c.concepto}</b> <br><span style="color:${color}; font-weight:bold;">${signo}${c.valor} CR</span></span>
                    <button class="btn-action btn-nuclear" onclick="borrarRecurso(${c.id})" style="padding: 2px 6px; font-size: 9px; margin-right:0;">🗑️</button>
                </li>
            `;
            if (isGasto) {
                listaGastos.innerHTML += itemHTML;
            } else {
                listaIngresos.innerHTML += itemHTML;
            }
        });

        if(listaGastos.innerHTML === '') listaGastos.innerHTML = '<p style="font-size:11px; color:gray; text-align:center; padding:10px;">No hay gastos.</p>';
        if(listaIngresos.innerHTML === '') listaIngresos.innerHTML = '<p style="font-size:11px; color:gray; text-align:center; padding:10px;">No hay ingresos.</p>';
    }

    async function añadirRecurso() {
        const concepto = document.getElementById('nombreRecurso').value;
        const tipo = document.getElementById('tipoRecurso').value;
        const valor = document.getElementById('valorRecurso').value;
        if(!concepto || !valor) return;
        await fetch(`${API_BASE_URL}/catalogo`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({concepto: concepto, tipo: tipo, valor: parseInt(valor)})
        });
        document.getElementById('nombreRecurso').value = '';
        document.getElementById('valorRecurso').value = '';
        cargarCatalogoAdmin();
    }

    async function borrarRecurso(id) {
        if(confirm("¿Eliminar este recurso del tarifario de la clase?")) {
            await fetch(`${API_BASE_URL}/catalogo/${id}`, { method: 'DELETE' });
            cargarCatalogoAdmin();
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadClass();
        cargarAvisosAdmin();
        cargarCatalogoAdmin(); 
    });
</script>

</body>
</html>
